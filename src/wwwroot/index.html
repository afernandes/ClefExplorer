<!DOCTYPE html>
<html lang="pt-br" data-accent="indigo" data-density="compact">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClefExplorer</title>
    <link rel="icon" href="app-icon.svg" />
    <!-- Aplica accent/tema persistidos antes da primeira pintura (evita FOUC).
         Mesmo formato que o ThemeService persiste: localStorage["omni.theme"] = "accent|dark". -->
    <script>
        (function () {
            var h = document.documentElement;
            var accent = 'indigo';
            var dark = false;
            var hasSaved = false;
            try {
                var saved = window.localStorage && window.localStorage.getItem('omni.theme');
                if (saved) {
                    hasSaved = true;
                    var parts = saved.split('|');
                    if (parts[0]) accent = parts[0];
                    if (parts.length >= 2) dark = (parts[1] === '1' || parts[1] === 'true');
                }
            } catch (e) { /* storage bloqueado — usa defaults */ }
            if (!hasSaved) {
                try {
                    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
                        dark = true;
                    }
                } catch (e) { /* matchMedia ausente */ }
            }
            h.setAttribute('data-accent', accent);
            if (dark) h.setAttribute('data-theme', 'dark');
        })();
    </script>
    <!-- Omni.Blazor design system (substitui o Bootstrap).
         No BlazorWebView os static web assets da RCL são servidos a partir do
         StaticWebAssetBasePath da lib ("/Omni.Blazor/..."), sem o prefixo "_content/". -->
    <link rel="stylesheet" href="Omni.Blazor/css/omni.css" />
    <link rel="stylesheet" href="css/app.css" />
</head>
<body>
    <div id="app">Carregando...</div>
    <script src="Omni.Blazor/js/Omni.js"></script>
    <script src="_framework/blazor.webview.js"></script>
</body>
</html>
