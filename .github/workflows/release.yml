name: Release to Microsoft Store

# Dispara ao publicar uma tag "v*" (ex.: v1.2.3) ou manualmente pela aba Actions.
# Pré-requisitos (configurar uma única vez em Settings > Secrets and variables > Actions):
#   AZURE_AD_TENANT_ID          - Tenant do Microsoft Entra ID associado ao Partner Center
#   AZURE_AD_APPLICATION_CLIENT_ID - Client ID do app do Entra ID
#   AZURE_AD_APPLICATION_SECRET    - Client secret desse app
#   SELLER_ID                   - Seller ID da conta do Partner Center
# O app já precisa existir na Store (product 9MVZN1HVJ230) com ao menos 1 submissão manual.
# Observação: o msstore CLI (preview) só automatiza produtos GRATUITOS.

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão do pacote (ex.: 1.2.3). Se vazio em push de tag, usa a tag.'
        required: false

permissions:
  contents: read

concurrency:
  group: release-store
  cancel-in-progress: false

jobs:
  store:
    name: Package MSIX & publish to Store
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # Normaliza a versão para 4 partes com a última = 0 (exigência da Store).
      - name: Resolve version
        id: ver
        shell: pwsh
        run: |
          $raw = '${{ github.event.inputs.version }}'
          if ([string]::IsNullOrWhiteSpace($raw)) { $raw = '${{ github.ref_name }}' }
          $raw = $raw.TrimStart('v','V')
          if ($raw -notmatch '^\d+\.\d+(\.\d+){0,2}$') {
            throw "Versão inválida: '$raw'. Use algo como v1.2.3 ou 1.2.3."
          }
          $p = @($raw.Split('.'))
          while ($p.Count -lt 3) { $p += '0' }
          $version = '{0}.{1}.{2}.0' -f $p[0], $p[1], $p[2]
          "version=$version" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Versão do pacote: $version"

      # Carimba a identidade do pacote no manifesto (só durante o build do CI; não é commitado):
      #  - Version: a Store exige versão crescente a cada envio (última parte = 0).
      #  - Publisher: tem que ser o Publisher ID da Store, não o publisher de dev local.
      #    O manifesto versionado mantém "CN=Anderson Fernandes" (combina com o cert local
      #    para F5/sideload); aqui trocamos pelo Publisher ID da Store para o pacote ser aceito.
      - name: Stamp manifest identity (version + Store publisher)
        shell: pwsh
        run: |
          # Publisher ID público da Store (Partner Center > Account settings > Identifiers >
          # "ID do editor do Windows"). Não é segredo — vai embutido em todo pacote publicado.
          $storePublisher = 'CN=495F8198-C0F8-459B-ACA7-C4452D36B643'
          $path = 'ClefExplorer.Package/Package.appxmanifest'
          [xml]$m = Get-Content -Path $path
          $m.Package.Identity.Version = '${{ steps.ver.outputs.version }}'
          $m.Package.Identity.Publisher = $storePublisher
          $m.Save((Resolve-Path $path).Path)
          Write-Host "Identity: Name=$($m.Package.Identity.Name) Publisher=$($m.Package.Identity.Publisher) Version=$($m.Package.Identity.Version)"

      # Empacota em modo StoreUpload, SEM assinar (a Store re-assina; o cert local não existe no runner).
      # NÃO usar GenerateTestArtifacts=false nem AppxPackageDir: ambos suprimem os pacotes de
      # recurso (scale-100/125/150/400), gerando um bundle incompleto que a Store recusa.
      - name: Build MSIX (StoreUpload, unsigned)
        shell: pwsh
        run: >
          msbuild ClefExplorer.Package/ClefExplorer.Package.wapproj
          /restore
          /p:Configuration=Release
          /p:Platform=x64
          /p:AppxBundle=Always
          /p:AppxBundlePlatforms=x64
          /p:UapAppxPackageBuildMode=StoreUpload
          /p:AppxPackageSigningEnabled=false

      - name: Locate upload package
        id: pkg
        shell: pwsh
        run: |
          # O wapproj gera .appxupload (alguns projetos geram .msixupload) — cobre ambos.
          $f = Get-ChildItem -Path 'ClefExplorer.Package/AppPackages' -Recurse -Include '*.appxupload','*.msixupload' |
               Sort-Object LastWriteTime -Descending | Select-Object -First 1
          if (-not $f) { throw 'Nenhum .appxupload/.msixupload encontrado em ClefExplorer.Package/AppPackages.' }
          "path=$($f.FullName)" | Out-File -FilePath $env:GITHUB_OUTPUT -Append
          Write-Host "Pacote: $($f.FullName)"

      # Guarda o pacote como artefato mesmo que o envio à Store falhe.
      - name: Upload .msixupload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ClefExplorer-msixupload
          path: ${{ steps.pkg.outputs.path }}
          if-no-files-found: error

      - name: Setup Microsoft Store CLI
        uses: microsoft/microsoft-store-apppublisher@v1.1

      - name: Configure msstore
        run: msstore reconfigure --tenantId ${{ secrets.AZURE_AD_TENANT_ID }} --sellerId ${{ secrets.SELLER_ID }} --clientId ${{ secrets.AZURE_AD_APPLICATION_CLIENT_ID }} --clientSecret ${{ secrets.AZURE_AD_APPLICATION_SECRET }}

      # Cria uma nova submissão para o app já existente e a publica.
      # -id é o Store product ID; --inputFile aponta o pacote já construído.
      - name: Publish to Microsoft Store
        run: msstore publish "ClefExplorer.Package" --inputFile "${{ steps.pkg.outputs.path }}" -id 9MVZN1HVJ230 -v
